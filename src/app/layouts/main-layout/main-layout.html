<div class="layout-container" [class.menu-open]="isSidebarOpen()">
  
  <!-- Мобильный полупрозрачный оверлей -->
  @if (isSidebarOpen()) {
    <div class="sidebar-overlay" (click)="closeSidebar()"></div>
  }

  <!-- Кнопка-бургер для мобильных устройств -->
  <button 
    class="mobile-menu-toggle" 
    [class.active]="isSidebarOpen()" 
    (click)="toggleSidebar()"
    [attr.aria-label]="isSidebarOpen() ? 'Закрыть меню' : 'Открыть меню'"
  >
    <span class="burger-line"></span>
    <span class="burger-line"></span>
    <span class="burger-line"></span>
  </button>

  <aside class="sidebar" [class.open]="isSidebarOpen()">
    <div class="logo-wrapper">
      <div class="logo">CSS Handbook</div>
      
      <!-- Кнопка закрытия сайдбара на мобильных -->
      <button class="sidebar-close-btn" (click)="closeSidebar()" aria-label="Закрыть меню">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
          <path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"></path>
        </svg>
      </button>
    </div>
    
    <div class="search-box">
      <input 
        type="text" 
        [value]="searchQuery()"
        (input)="onSearchInput($event)"
        placeholder="Поиск темы..." 
        class="search-input"
        aria-label="Поиск учебных тем"
      >
    </div>

    <nav class="navigation">
      @for (section of filteredMenu(); track section.title) {
        <div class="nav-section">{{ section.title }}</div>
        
        @for (item of section.items; track item.id) {
          <a 
            [routerLink]="['/' + item.route]" 
            routerLinkActive="active" 
            class="nav-link"
          >
            {{ item.id }}. {{ item.title }}
          </a>
        }
      } @empty {
        <div class="search-empty">
          <span>Ничего не найдено</span>
        </div>
      }
    </nav>
  </aside>

  <main class="content-area">
    <app-header></app-header>

    <router-outlet></router-outlet>

    <app-footer></app-footer>
  </main>

</div>
