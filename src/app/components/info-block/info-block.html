<div class="info-block" [ngClass]="type()">
  <div class="info-block-aside">
    @switch (type()) {
      @case ('tip') {
        <svg class="info-icon" viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
          <path d="M8 1.5c-2.363 0-4 1.637-4 4 0 .918.353 1.703.844 2.508.434.71.972 1.344 1.406 2.05.352.573.5 1.144.5 1.942a.75.75 0 00.75.75h3a.75.75 0 00.75-.75c0-.798.148-1.369.5-1.942.434-.706.972-1.34 1.406-2.05.49-.805.844-1.59.844-2.508 0-2.363-1.637-4-4-4zM2.5 5.5c0-3.137 2.363-5.5 5.5-5.5s5.5 2.363 5.5 5.5c0 1.259-.512 2.355-1.156 3.414-.43.705-.916 1.27-1.294 1.886-.184.3-.331.62-.435.95H5.885c-.104-.33-.251-.65-.435-.95-.378-.616-.864-1.18-1.294-1.886C3.512 7.855 2.5 6.759 2.5 5.5z"></path>
          <path d="M6 14h4a1 1 0 110 2H6a1 1 0 110-2z"></path>
        </svg>
      }
      @case ('warning') {
        <svg class="info-icon" viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
          <path d="M8.22 1.75a.75.75 0 00-1.33 0L.39 12.44c-.38.65.1 1.46.86 1.46h13.5c.76 0 1.24-.81.86-1.46L8.22 1.75zm-.59 8a.75.75 0 111.5 0 .75.75 0 01-1.5 0zm0-4a.75.75 0 011.5 0v3a.75.75 0 01-1.5 0v-3z"></path>
        </svg>
      }
      @case ('error') {
        <svg class="info-icon" viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
          <path d="M8 15A7 7 0 118 1a7 7 0 010 14zm0 1A8 8 0 108 0a8 8 0 000 16z"></path>
          <path d="M4.646 4.646a.5.5 0 01.708 0L8 7.293l2.646-2.647a.5.5 0 01.708.708L8.707 8l2.647 2.646a.5.5 0 01-.708.708L8 8.707l-2.646 2.647a.5.5 0 01-.708-.708L7.293 8 4.646 5.354a.5.5 0 010-.708z"></path>
        </svg>
      }
      @default {
        <svg class="info-icon" viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
          <path d="M8 15A7 7 0 118 1a7 7 0 010 14zm0 1A8 8 0 108 0a8 8 0 000 16z"></path>
          <path d="M8.93 6.588l-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533L8.93 6.588zM9 4.5a1 1 0 11-2 0 1 1 0 012 0z"></path>
        </svg>
      }
    }
  </div>

  <div class="info-block-content">
    <div class="info-block-title">{{ blockTitle() }}</div>
    <div class="info-block-body">
      <ng-content></ng-content>
    </div>
  </div>
</div>
